<div class="interview-container">
  <div class="header">
    <h2>AI Text Interview</h2>
    <p>Complete this text-based interview to generate your AI assessment report.</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="state === 'idle' || state === 'creating_session' || state === 'error' && !sessionId" class="setup-section card">
    <h3>Setup Interview</h3>
    <div class="form-group">
      <label>Target Job Title *</label>
      <input type="text" [(ngModel)]="targetJobTitle" class="form-control" placeholder="e.g. Frontend Engineer" [disabled]="state === 'creating_session'">
    </div>
    <div class="form-group">
      <label>Target Company (Optional)</label>
      <input type="text" [(ngModel)]="targetCompanyName" class="form-control" placeholder="e.g. Acme Corp" [disabled]="state === 'creating_session'">
    </div>
    <button class="btn btn-primary mt-3" (click)="startSession()" [disabled]="!targetJobTitle.trim() || state === 'creating_session'">
      <span *ngIf="state === 'creating_session'" class="spinner-border spinner-border-sm me-2"></span>
      Start Interview
    </button>
  </div>

  <div *ngIf="state === 'ready' || state === 'submitting_answers' || state === 'generating_report' || (state === 'error' && sessionId)" class="interview-section">
    <div class="card mb-4" *ngFor="let q of questions; let i = index">
      <div class="card-body">
        <h5 class="card-title">Question {{ i + 1 }}</h5>
        <p class="card-text">{{ q }}</p>
        <textarea 
          [(ngModel)]="answers[i]" 
          class="form-control" 
          rows="4" 
          placeholder="Enter your answer here (minimum 20 characters)..."
          [disabled]="state !== 'ready' && state !== 'error'">
        </textarea>
        <small class="text-muted" [ngClass]="{'text-danger': answers[i].length < 20 && answers[i].length > 0}">
          {{ answers[i].length }} / 20 minimum characters
        </small>
      </div>
    </div>

    <div class="card mb-4 consent-card">
      <div class="card-body">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" [(ngModel)]="consentGiven" id="consentCheck" [disabled]="state !== 'ready' && state !== 'error'">
          <label class="form-check-label" for="consentCheck">
            I consent to my answers being processed by AI to generate an assessment report. I understand this is for evaluation purposes.
          </label>
        </div>
      </div>
    </div>

    <div class="action-bar mb-5">
      <button 
        class="btn btn-success btn-lg w-100" 
        (click)="submitAndGenerate()" 
        [disabled]="!isSubmitValid || (state !== 'ready' && state !== 'error')">
        
        <span *ngIf="state === 'submitting_answers' || state === 'generating_report'" class="spinner-border spinner-border-sm me-2"></span>
        <span *ngIf="state === 'ready' || state === 'error'">Submit Answers & Generate Report</span>
        <span *ngIf="state === 'submitting_answers'">Submitting answers...</span>
        <span *ngIf="state === 'generating_report'">Analyzing answers and generating report... (this may take a minute)</span>
      </button>
    </div>
  </div>
</div>
