<div class="report-wrapper">
    <!-- Header -->
    <header class="report-header flex-between">
        <div class="header-left flex-center">
            <button class="back-link flex-center" (click)="goBackToHub()">
                <i class='bx bx-left-arrow-alt'></i> Back to Hub
            </button>
            <h2 class="header-title">Performance Report</h2>
            <span class="track-title" *ngIf="interviewTrack">/ {{ interviewTrack.title }}</span>
        </div>
        <div class="header-right flex-between">
            <div class="user-info flex-center">
                <span class="user-name">{{ userName }}</span>
                <div class="user-avatar">
                    <img [src]="googleAvatarUrl || 'https://ui-avatars.com/api/?name=User'" alt="User Avatar" />
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    @if (isLoading) {
        <div class="loader-container flex-center">
            <div class="spinner"></div>
            <p>Retrieving your AI interview report...</p>
        </div>
    } @else {
        <main class="report-container">
            <div class="report-card card">
                <div class="report-header-accent flex-between">
                    <div class="badge-pill">
                        <i class='bx bx-award'></i> EVALUATION COMPLETED
                    </div>
                    <div class="date-stamp" *ngIf="interviewTrack">
                        Generated by Gemini 2.5 Flash
                    </div>
                </div>
                
                <!-- Parsed HTML Report -->
                <div class="report-content markdown-body" [innerHTML]="reportHtml"></div>
                
                <!-- Action Footer -->
                <div class="report-action-footer flex-center">
                    <button class="btn-black btn-primary" (click)="goBackToHub()">
                        <i class='bx bx-home-alt'></i> Return to Dashboard
                    </button>
                </div>
            </div>
        </main>
    }
</div>
